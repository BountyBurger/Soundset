<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundset - Login</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.webp') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="{{ url_for('static', filename='js/all.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
</head>

<body>
    <div class="d-flex py-4 justify-content-center">
        <div class="d-flex align-items-center">
            <img src="{{ url_for('static', filename='pwa/512.webp') }}" width="40" height="40"
                class="me-2 rounded-circle shadow-sm">
            <img src="{{ url_for('static', filename='pwa/lt100.webp') }}" width="auto" height="30"
                class="me-2 shadow-sm">
        </div>
    </div>

    <div class="container">
        <div class="card mt-2 shadow">
            <ul role="tablist" class="nav nav-pills nav-fill w-100">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="home-tab" data-bs-toggle="tab"
                        data-bs-target="#artists-tab-pane" type="button" role="tab">Create a database</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#tags-tab-pane"
                        type="button" role="tab">Load a database</button>
                </li>
            </ul>
            <div class="tab-content pt-2">
                <div class="tab-pane fade show active" id="artists-tab-pane" role="tabpanel" tabindex="0">
                    <div class="card-body">
                        <form autocomplete="off">
                            <div class="form-group">
                                <label for="db_name_create">Database name</label>
                                <input type="text" class="form-control" id="db_name_create" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="db_password_create">Password</label>
                                <input type="password" class="form-control" id="db_password_create"
                                    autocomplete="new-password">
                            </div>
                            <div class="form-group">
                                <label for="db_password_create_repeat">Repeat password</label>
                                <input type="password" class="form-control" id="db_password_create_repeat"
                                    autocomplete="new-password">
                            </div>
                        </form>
                    </div>
                    <div class="card-footer">
                        <div class="d-grid">
                            <button type="submit" class="disabled btn btn-dark" id="create_db_btn">Create</button>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="tags-tab-pane" role="tabpanel" tabindex="0">
                    <div class="card-body">
                        <form autocomplete="on">
                            <div class="form-group">
                                <label for="db_name_load">Database Name</label>
                                <input type="text" class="form-control" id="db_name_load" name="db_name"
                                    autocomplete="username" required>
                            </div>
                            <div class="form-group">
                                <label for="db_password_load">Password</label>
                                <input type="password" class="form-control" id="db_password_load" name="db_password"
                                    autocomplete="current-password" required>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer">
                        <div class="d-grid">
                            <button type="submit" class="disabled btn btn-dark" id="load_db_btn">Load</button>
                        </div>
                        <div id="alert" class="mt-3 alert alert-danger" style="display: none;" role="alert"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="{{ url_for('static', filename='js/jquery-3.7.1.min.js') }}"></script>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</html>
